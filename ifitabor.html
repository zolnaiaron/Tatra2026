<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>obgyifi.hu</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            text-align: center; 
            margin-top: 20%; 
            font-family: sans-serif; 
        }
        
        .loading-dots {
            font-size: 2rem;
            letter-spacing: 8px;
        }
        
        .dot {
            animation: fade 1.4s infinite;
        }
        
        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes fade {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>Hamarosan<span class="loading-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span></h1>
</body>
</html>
